{% extends "base.html" %}
{% block title %}Editar producto · Ferretería{% endblock %}
{% block content %}
<section class="page-heading"><div><p class="eyebrow">Catálogo</p><h1>Editar producto</h1></div><a class="btn btn--ghost" href="{{ url_for('products.admin') }}">Volver</a></section>
<section class="panel"><form class="form-stack" method="post"><label>Nombre <input name="nombre" value="{{ product.nombre }}" required></label><label>Descripción <input name="descripcion" value="{{ product.descripcion or '' }}"></label><label>Código <input name="codigo_producto" value="{{ product.codigo_producto }}" required></label><label>Código barras <input name="codigo_barras" value="{{ product.codigo_barras or '' }}"></label><label>Categoría <select name="categoria_id" required>{% for c in categorias %}<option value="{{ c.id }}" {% if product.categoria_id==c.id %}selected{% endif %}>{{ c.nombre }}</option>{% endfor %}</select></label><label>Marca <select name="marca_id"><option value="">Sin marca</option>{% for m in marcas %}<option value="{{ m.id }}" {% if product.marca_id==m.id %}selected{% endif %}>{{ m.nombre }}</option>{% endfor %}</select></label><label>Precio compra <input type="number" step="0.01" name="precio_compra" value="{{ product.precio_compra or '' }}"></label><label>Contenido caja <input type="number" min="1" step="1" name="contenido_por_caja" value="{{ product.contenido_por_caja or '' }}"></label><label>Precio venta <input type="number" step="0.01" name="precio_venta_estandar" value="{{ product.precio_venta_estandar or '' }}"></label><label>Precio mínimo <input type="number" step="0.01" name="precio_minimo_venta" value="{{ product.precio_minimo_venta or '' }}"></label><label>Estado <select name="estado"><option value="ACTIVO" {% if product.estado=='ACTIVO' %}selected{% endif %}>Activo</option><option value="INACTIVO" {% if product.estado=='INACTIVO' %}selected{% endif %}>Inactivo</option></select></label><button class="btn btn--primary" type="submit">Guardar</button></form></section>
{% endblock %}
